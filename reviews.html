                    <a href="tel:+79624559569" class="phone">+7 (962) 455-95-69</a>
                </div>
                <button class="theme-toggle" id="theme-toggle">🌙</button>
            </div>
        </div>
    </header>
    <main>
        <section class="reviews-page">
            <div class="container">
                <h1>Отзывы наших клиентов</h1>
                <!-- Список отзывов -->
                <div class="reviews__grid" id="reviews-container">
                    <!-- Отзывы из базы -->
                </div>
                <!-- Форма добавления отзыва (красивая) -->
                <div class="review-form">
                    <h2>Оставить отзыв</h2>
                    <form id="review-form">
                        <!-- Имя -->
                        <div class="form-group">
                            <label for="author">Ваше имя</label>
                            <input type="text" id="author" name="author" placeholder="Например, Анна" required>
                        </div>
                        <!-- Дата (автоматически) -->
                        <div class="form-group">
                            <label for="date">Дата</label>
                            <input type="date" id="date" name="date" readonly>
                        </div>
                        <!-- Отзыв -->
                        <div class="form-group">
                            <label for="text">Ваш отзыв</label>
                            <textarea id="text" name="text" placeholder="Напишите, что вам понравилось..." rows="6" required></textarea>
                        </div>

                        <!-- Рейтинг звёздами -->
                        <div class="form-group rating-group">
                            <label>Оценка</label>
                           <div class="stars">
    <input type="radio" name="rating" value="5" id="star5" checked><label for="star5">★</label>
    <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
    <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
    <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
    <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
</div>

                        <!-- Ссылка на Яндекс -->
                        <div class="form-group">
                            <label for="yandex_link">Ссылка на Яндекс.Отзывы (необязательно)</label>
                            <input type="url" id="yandex_link" name="yandex_link" placeholder="https://yandex.ru/maps/...">
                        </div>

                        <!-- Согласие -->
                        <div class="checkbox">
                            <input type="checkbox" id="agree" required>
                            <label for="agree">Я согласен на обработку персональных данных</label>
                        </div>

                        <button type="submit" class="btn btn--large">Отправить отзыв</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <!-- Футер -->

                </div>
                <div class="footer__info">
                    <p>ИП Гиренко О.А.</p>
                </div>
            </div>
        </div>
    </footer>

</body>
